# golangci-lint v2 configuration for engram.
#
# We fix the codebase against golangci-lint v2.x. The CI workflow still pins
# v1.62 during the v2 migration window; that pin is intentional and lives in
# .github/workflows/push.yml. This config governs local/v2 runs.
#
# No linter is blanket-disabled to fake a pass. The four linters below are the
# ones that flagged real issues on master; all violations were fixed in code.
version: "2"

linters:
  enable:
    - errcheck    # unchecked error returns
    - govet       # suspicious constructs
    - staticcheck # bugs, deprecations, simplifications
    - unused      # dead code
