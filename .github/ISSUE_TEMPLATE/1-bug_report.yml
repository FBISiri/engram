name: Bug Report
description: Report a reproducible bug in Engram
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, one-sentence description of the bug.
      placeholder: "e.g. memory_search returns empty results when confidence decay is enabled"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Start Engram with ENGRAM_TRANSPORT=http
        2. Add a memory via POST /memories
        3. Call GET /memories?min_decay_score=0.5
        4. Observe empty results
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Fill in your environment details.
      value: |
        - Engram version / commit:
        - Go version (`go version`):
        - Qdrant version:
        - OS / arch:
        - Transport mode (stdio / http / both):
        - Embedder (openai / voyage):
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs. Redact any API keys.
      render: shell
