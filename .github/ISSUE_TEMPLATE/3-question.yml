name: Question
description: Ask a question about using or understanding Engram
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Ask away. For bugs use the Bug Report template; for feature ideas use Feature Request.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant background — what you're trying to do, what you've already tried, your environment setup.
